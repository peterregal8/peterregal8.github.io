<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scatter Plot in D3</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Adapted implementation from the in-class code shared on edStem on 2/20/2026 (css style, scaling, tooltips) -->
    <style>
        .bar {
            fill: orangered;
        }
        .bar:hover {
            fill: green;
        }
        .axis-x path,
        .axis-y path {
            fill: none;
            stroke: black;
            shape-rendering: crispEdges;
        }
        .axis-x .tick line,
        .axis-y .tick line {
            stroke: #ccc;
        }
        .axis text {
            font-size: 10px;
        }

        /* Tooltip styles */
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
    </style>
</head>
<body>
    <div id="chart-container"></div>

    <!-- Tooltip element -->
    <div class="tooltip" id="tooltip"></div>

    <script>


        // As stated above, I heavily used the in-class code provided (https://edstem.org/us/courses/91852/discussion/7700634?answer=17874522) as a reference
        // for this visualization. The scaling and tooltips are an identical implementation to that code, and I added my own svg text elements for the title
        // and the axes.

        const svgWidth = 900;
        const svgHeight = 500;
        const margin = { top: 40, right: 20, bottom: 50, left: 100 };
        const width = svgWidth - margin.left - margin.right;
        const height = svgHeight - margin.top - margin.bottom;


        d3.csv("Top100SpotifySongs.csv", function(data) {
            return {
                duration : +data["Duration_Seconds"],
                score : +data["Popularity_Score"]
            };
        }).then(function(dataset) {

            // Sort function found from https://d3js.org/d3-array/sort
            dataset.sort(function(a, b) {
                return d3.ascending(a.score, b.score);
            });
            console.log(dataset);

            const svg = d3.select("#chart-container")
                .append("svg")
                .attr("width", svgWidth)
                .attr("height", svgHeight);

            const chart = svg.append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);


            svg.append("text")
                .attr("x", width / 2.5)
                .attr("y", margin.top / 2)
                .style("font-family", "Helvetica")
                .text("Duration Seconds vs Popularity Score of Spotify's Top Artists of 2025");

            svg.append("text")
                .attr("x", width / 1.75)
                .attr("y", svgHeight - margin.bottom + 40)
                .style("font-family", "Helvetica")
                .text("Duration Seconds");

            var rotateY = margin.top / 2;

            svg.append("text")
                .attr("x", 100)
                .attr("y", margin.top / 2)
                .attr("transform", "rotate(270, 220, 180)")
                .style("font-family", "Helvetica")
                .text("Popularity Score");

            console.log(d3.min(dataset, d => d.duration))
            console.log(d3.max(dataset, d => d.duration))


            // Scaling and tooltips 
            const scaleX = d3.scaleLinear()
                .domain([d3.min(dataset, d => d.duration) - 50, d3.max(dataset, d => d.duration) + 50])
                .range([0, width]);

            const scaleY = d3.scaleLinear()
                .domain(d3.extent(dataset, d => d.score))
                .nice()
                .range([height, 0]);

            chart.append("g")
                .attr("class", "axis axis-x")
                .attr("transform", `translate(0, ${height})`)
                .call(d3.axisBottom(scaleX));

            chart.append("g")
                .attr("class", "axis axis-y")
                .call(d3.axisLeft(scaleY).ticks(5));

            // Tooltip reference
            const tooltip = d3.select("#tooltip");

            // Add bars with tooltip events
            chart.selectAll(".bar")
                .data(dataset)
                .enter()
                .append("circle")
                .attr("class", "bar")
                .attr("cx", d => scaleX(d.duration))
                .attr("cy", d => scaleY(d.score))
                .attr("r", 5)
                .on("mouseover", (event, d) => {
                    tooltip
                        .html(`<text>Duration: </text>${d.duration}<text>, Score: </text> ${d.score}`)
                        .style("opacity", 1)
                        .style("font-family", "Helvetica");
                })
                .on("mousemove", (event) => {
                    tooltip
                        .style("left", (event.pageX + 12) + "px")
                        .style("top",  (event.pageY - 28) + "px");
                })
                .on("mouseleave", () => {
                    tooltip.style("opacity", 0);
                });   
        });
    </script>
</body>
</html>
