<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scatterplot Matrix in D3</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    .axis-x path,
    .axis-y path {
      fill: none;
      stroke: black;
      shape-rendering: crispEdges;
    }
    .axis-x .tick line,
    .axis-y .tick line {
      stroke: #ccc;
    }
    .axis text {
      font-size: 10px;
    }
    </style>
</head>
<body>
<div id="title"></div>
<svg id="splom"></svg>
<script>

// Code adapted from post on edStem on 2/24/2026 (https://edstem.org/us/courses/91852/discussion/7725451)  
const cellSize = 250;
const padding  = 100;
const width = 500;

d3.csv("water_consumption.csv", function(data) {
  return {
    Water_Consumption : +data["Total Water Consumption (Billion m3)"],
    Per_Capita_Water_Use : +data["Per Capita Water Use (L/Day)"],
    Rainfall_Impact : +data["Rainfall Impact (mm)"]
  };
}).then(data => {
  const cols = Object.keys(data[0]);
  const n    = cols.length;
  const size = n * cellSize;

  const title = d3.select("title")
    .attr("width",  100)
    .attr("height", 100)
    .append("g")
    .attr("transform", `translate(${25},${25})`);


  const svg = d3.select("#splom")
    .attr("width",  size + padding)
    .attr("height", size + padding)
    .append("g")
    .attr("transform", `translate(${padding / 2},${padding / 2})`);

  // One linear scale per column
  const scales = {};
  const scalesY = {};
  cols.forEach(col => {
    scales[col] = d3.scaleLinear()
      .domain(d3.extent(data, d => d[col])).nice()
      .range([10, cellSize - 10]);
    scalesY[col] = d3.scaleLinear()
      .domain(d3.extent(data, d => d[col])).nice()
      .range([cellSize - 10, 10]);
  });

  svg.append("text")
    .attr("x", width / 2.25)
    .attr("y", 0)
    .style("font-family", "Helvetica")
    .text("Rainfall Impact of China from 2016 to 2025");

  // X axes

  cols.forEach((yCol, row) => {
    cols.forEach((xCol, col) => {
      const g = svg.append("g")
        .attr("transform", `translate(${col * cellSize},${(row + 1) * cellSize + 20})`)
        .attr("class", "axis axis-x");
        if (row !== col) {
          g.call(d3.axisBottom(scales[xCol]).ticks(6));
        }
    });
  });

  // Y axes

  cols.forEach((yCol, row) => {
    cols.forEach((xCol, col) => {
      const g = svg.append("g")
        .attr("transform", `translate(${col * cellSize},${(row) * cellSize + 20})`)
        .attr("class", "axis axis-x");
        if (row === col) {
        } else if (col == 2 || (col == 1 && row == 2)) {
          g.attr("transform", `translate(${(col + 1) * cellSize},${(row) * cellSize + 20})`)
          g.call(d3.axisRight(scalesY[yCol]).ticks(6));
        } else {
          g.call(d3.axisLeft(scalesY[yCol]).ticks(6));
        }
    });
  });

  // Draw one cell per (row, col) pair
  cols.forEach((yCol, row) => {
    cols.forEach((xCol, col) => {
      const g = svg.append("g")
        .attr("transform", `translate(${col * cellSize},${row * cellSize + 20})`);

      // Cell border
      g.append("rect")
        .attr("width",  cellSize)
        .attr("height", cellSize)
        .attr("fill", "none")
        .attr("stroke", "#aaa");

      if (row === col) {
        // Diagonal: just show the variable name
        g.append("text")
          .attr("x", cellSize / 2)
          .attr("y", cellSize / 2)
          .attr("text-anchor", "middle")
          .attr("dominant-baseline", "middle")
          .attr("font-size", "12px")
          .style("font-family", "Helvetica")
          .text(xCol);
      } else {

        // Off-diagonal: scatter plot

        g.selectAll("circle")
          .data(data)
          .join("circle")
          .attr("cx", d => scales[xCol](d[xCol]))
          .attr("cy", d => scales[yCol](d[yCol]))
          .attr("r", 2)
          .attr("fill", "orangered")
          .attr("opacity", 0.6);
      }
    });
  });
});
</script>
</body>
</html>
