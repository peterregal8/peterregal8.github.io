<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scatterplot Matrix in D3</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script>
<script src="//d3js.org/d3-scale-chromatic.v0.3.min.js"></script>
  <style>
    .axis-x path,
    .axis-y path {
      fill: none;
      stroke: black;
      shape-rendering: crispEdges;
    }
    .axis-x .tick line,
    .axis-y .tick line {
      stroke: #ccc;
    }
    .axis text {
      font-size: 10px;
    }
    </style>
</head>
<body>
<div id="title"></div>
<svg id="splom"></svg>
<script>

// Code adapted from post on edStem on 2/24/2026 (https://edstem.org/us/courses/91852/discussion/7725451)  
const cellSize = 250;
const padding  = 100;
const width = 500;
const height = 500;

const parseYear = d3.timeParse("%Y")
d3.csv("water_consumption.csv", function(data) {
  return {
    date : parseYear(data["Year"]),
    country : data["Country"],
    rainfall_impact : +data["Rainfall Impact (mm)"]
  };
}).then(data => {

  const onlyFour = data.filter(function(d) {
    return d.country === "USA" || d.country === "China" 
        || d.country === "Pakistan" || d.country === "Ethiopia";
  });  

  onlyFour.sort(function(a, b) {
    return d3.ascending(a.country, b.country);
  });

  const countries = d3.group(onlyFour, d => d.country);

  const countryArray = Array.from(countries);

  const rows = 2;
  const cols = 2;

  const title = d3.select("#title")
    .attr("width",  100)
    .attr("height", 100)
    .append("g")
    .attr("transform", `translate(${25},${25})`);


  const svg = d3.select("#splom")
    .attr("width",  900)
    .attr("height", 700)
    .append("g")
    .attr("transform", `translate(${padding / 2},${padding / 2})`);

  const scaleTime = d3.scaleTime()
    .domain([d3.min(onlyFour, d => d.date), d3.max(onlyFour, d => d.date)])
    .range([0, width / 2]);


  const scaleY = d3.scaleLinear()
    .domain([0, d3.max(onlyFour, d => d.rainfall_impact)])
    .range([200, 0]);

  svg.append("text")
    .attr("x", width / 2.5)
    .attr("y", 0)
    .style("font-family", "Helvetica")
    .text("Rainfall Impact by Country from 2016 to 2025");

  svg.append("text")
    .attr("transform", `rotate(-90, 140, 130)`)
    .style("font-family", "Helvetica")
    .style("font-size", 12)
    .text("Rainfall Impact (mm)");

  svg.append("text")
    .attr("transform", `rotate(-90, 310, -50)`)
    .style("font-family", "Helvetica")
    .style("font-size", 12)
    .text("Rainfall Impact (mm)");

  svg.append("text")
    .attr("transform", `rotate(-90, 290, 280)`)
    .style("font-family", "Helvetica")
    .style("font-size", 12)
    .text("Rainfall Impact (mm)");

  svg.append("text")
    .attr("transform", `rotate(-90, 460, 100)`)
    .style("font-family", "Helvetica")
    .style("font-size", 12)
    .text("Rainfall Impact (mm)");


  // X axes

  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
        const g = svg.append("g")
            .attr("transform", `translate(${i * 350 + 50},${j * 300 + 300})`)
        g.call(d3.axisBottom(scaleTime))
        svg.append("text")
            .attr("x", i * 350 + 160)
            .attr("y", j * 300 + 340)
            .style("font-family", "Helvetica")
            .style("font-size", 12)
            .text("Year");
    }
  }

  for (let i = 0; i < rows; i++) {
    for (let j = 0; j < cols; j++) {
        const g = svg.append("g")
            .attr("transform", `translate(${i * 350 + 50},${j * 300 + 100})`)
        g.call(d3.axisLeft(scaleY).ticks(5));
    }
  }
  
  countryArray.forEach(([country, values], i) => {
    const col = i % 2;
    const row = Math.floor(i / 2);

    svg.append("text")
        .attr("x", 160 + col * 370)   
        .attr("y", 70 + row * 320)
        .style("font-family", "Helvetica")
        .attr("text-anchor", "middle")
        .text(country);
  });

  // Qualitative color scale from ColorBrewer: https://colorbrewer2.org/#type=qualitative&scheme=Set1&n=5
  // Used code from the d3-legend page: https://d3-legend.susielu.com/
  var quantize = d3.scaleOrdinal()
    .domain(["China", "Ethiopia", "Pakistan", "USA"])
    .range(["#4daf4a", "#984ea3", "#377eb8", "#e41a1c"]);


  svg.append("g")
    .attr("class", "legendQuant")
    .style("font-family", "Helvetica")
    .attr("transform", "translate(700,150)");

  var legend = d3.legendColor()
    .labelFormat(d3.format(".0f"))
    .title("Country")
    .titleWidth(100)
    .scale(quantize);

  svg.select(".legendQuant")
    .call(legend);

  var line = d3.line()
    .x(d => scaleTime(d.date))
    .y(d => scaleY(d.rainfall_impact))


  countryArray.forEach(([country, values], i) => {
    const col = i % 2;
    const row = Math.floor(i / 2);

    const g = svg.append("g")
        .attr("transform", `translate(${col * 350 + 50}, ${row * 300 + 100})`);

    g.append("path")
        .datum(values)
        .attr("d", line)
        .attr("fill", "none")
        .attr("stroke", quantize(country))
        .attr("stroke-width", 3);
  }); 
});
</script>
</body>
</html>
